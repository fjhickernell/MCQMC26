name: Publish Quarto site to gh-pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-22.04
    env:
      RETICULATE_USE_MANAGED_VENV: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          clean: true

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install LaTeX for matplotlib usetex
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            dvipng \
            ghostscript \
            cm-super

      - name: Set RETICULATE_PYTHON
        run: |
          echo "RETICULATE_PYTHON=$pythonLocation/bin/python" >> "$GITHUB_ENV"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter ipykernel
          python -m pip install -e classlib
          if [ -f qmcsoftware/pyproject.toml ]; then
            python -m pip install -e "qmcsoftware/.[class]"
          fi
          python -m ipykernel install --user --name qmcpy --display-name "qmcpy"

      - name: Render website
        run: |
          quarto render

      - name: Render slides subproject
        run: |
          cd slides
          quarto render

      - name: Stage slides into website output
        run: |
          rm -rf _site/slides
          mkdir -p _site/slides
          rsync -a --delete slides/_site/ _site/slides/

      - name: Clean Quarto publish worktree
        run: |
          rm -rf .quarto/quarto-publish-worktree-*
          rm -rf _site/.git

      - name: Publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
